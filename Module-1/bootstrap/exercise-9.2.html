<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Groups</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <h2 class="mb-4">Button Group</h2>

        <div class="btn-group mb-5">

            <button class="btn btn-primary">
                Left
            </button>

            <button class="btn btn-primary">
                Middle
            </button>

            <button class="btn btn-primary">
                Right
            </button>

        </div>

        <h2 class="mb-4">Toggle Buttons</h2>

        <div class="btn-group" role="group">

            <input type="checkbox" class="btn-check" id="btn1">
            <label class="btn btn-outline-success" for="btn1">
                Option 1
            </label>

            <input type="checkbox" class="btn-check" id="btn2">
            <label class="btn btn-outline-success" for="btn2">
                Option 2
            </label>

            <input type="checkbox" class="btn-check" id="btn3">
            <label class="btn btn-outline-success" for="btn3">
                Option 3
            </label>

        </div>

    </div>

</body>
</html>
