<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Responsive Grid</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container mt-5">

        <div class="row g-3">

            <div class="col-12 col-md-6 col-lg-4">
                <div class="bg-primary text-white p-4 text-center rounded">
                    Column 1
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="bg-success text-white p-4 text-center rounded">
                    Column 2
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="bg-danger text-white p-4 text-center rounded">
                    Column 3
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
