<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
</head>
<body>
    <h1>Register for Events</h1>
    <form action="./dashboard.html" method="get">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email"><br><br>
        <input type="address" id="address" name="address"><br><br>
        <label for="event">Select Event:</label>
        <select id="event" name="event">
            <option value="event1">Annual Tech Conference - January 15, 2024</option>
            <option value="event2">Marketing Summit - February 20, 2024</option>
            <option value="event3">Product Launch - March 10, 2024</option>
        </select><br><br>
        <input type="submit" value="Register">
    </form>
</body>
</html>
